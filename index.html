<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1A1A1A" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="author" content="Yui (Wayne) Tien" />

    <!-- Constant OG/Twitter bits (type, site_name, card, image dimensions — all
         our OG images are 1200×630). Per-route title/description/url/locale and
         the og:image/twitter:image URL itself are set by react-helmet-async
         (src/seo/Seo.tsx) and rewritten in the prerender step (scripts/prerender.mjs). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Yui (Wayne) Tien" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Load fonts without blocking first paint: fetch as a print stylesheet
         (non-render-blocking), then flip to all once loaded. display=swap means
         text shows immediately in the fallback and swaps in when ready. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap"></noscript>
    <title>Yui (Wayne) Tien | AI Product & Agent Workflow Portfolio</title>
    <script>
      // Restore path stored by 404.html redirect
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          window.history.replaceState(null, '', redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
