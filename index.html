<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Open Graph / Twitter type+image don't vary per route; title/description/url are set per-page via react-helmet-async (see src/seo/Seo.tsx) -->
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://waynetien.com/avatar.png" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:image" content="https://waynetien.com/avatar.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>Yui (Wayne) Tien | AI Product & Agent Workflow Portfolio</title>
    <script>
      // Restore path stored by 404.html redirect
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          window.history.replaceState(null, '', redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
