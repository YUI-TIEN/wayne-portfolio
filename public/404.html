<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect: store path in sessionStorage, redirect to base
      var path = window.location.pathname.replace('/wayne-portfolio', '') || '/';
      var search = window.location.search;
      sessionStorage.setItem('spa_redirect', path + search);
      window.location.replace('/wayne-portfolio/');
    </script>
  </head>
  <body></body>
</html>
